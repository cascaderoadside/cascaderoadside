<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Service — Cascade Roadside</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
            padding: 16px 20px;
            border-bottom: 2px solid #C4962A;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #C4962A;
            margin: 0 0 4px 0;
        }

        .header p {
            font-size: 12px;
            color: #888;
            margin: 0;
        }

        .content {
            flex: 1;
            display: flex;
            overflow: hidden;
            gap: 0;
        }

        #map {
            flex: 1;
            position: relative;
        }

        .tracking-panel {
            width: 320px;
            background: #1a1f2e;
            border-left: 1px solid #333;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        .status-section {
            background: rgba(196, 150, 42, 0.1);
            border: 1px solid #C4962A;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .status-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .status-value {
            font-size: 20px;
            font-weight: 700;
            color: #C4962A;
            margin-bottom: 8px;
        }

        .status-icon {
            font-size: 36px;
            margin-bottom: 12px;
        }

        .eta-section {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid #22c55e;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .eta-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .eta-time {
            font-size: 28px;
            font-weight: 700;
            color: #22c55e;
            font-variant-numeric: tabular-nums;
        }

        .job-details {
            background: rgba(30, 40, 50, 0.8);
            border: 1px solid #333;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 12px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
        }

        .detail-row:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .detail-label {
            color: #888;
        }

        .detail-value {
            font-weight: 600;
            color: #f5f5f5;
        }

        .call-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 16px;
            text-decoration: none;
        }

        .call-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #ddd;
            border-top: 2px solid #C4962A;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-messages {
            font-size: 12px;
            line-height: 1.5;
            color: #ccc;
        }

        .warning-box {
            background: rgba(239, 68, 68, 0.1);
            border-left: 4px solid #ef4444;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 12px;
            color: #fca5a5;
        }

        @media (max-width: 768px) {
            .content {
                flex-direction: column;
            }

            #map {
                height: 50%;
            }

            .tracking-panel {
                width: 100%;
                height: auto;
                max-height: 50%;
                border-left: none;
                border-top: 1px solid #333;
            }

            .header h1 {
                font-size: 18px;
            }
        }

        @media (max-width: 600px) {
            .tracking-panel {
                padding: 12px;
            }

            .status-value {
                font-size: 18px;
            }

            .eta-time {
                font-size: 24px;
            }

            .call-button {
                padding: 10px 14px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗺️ Track Your Service</h1>
            <p id="trackingStatus">Loading job details...</p>
        </div>

        <div class="content">
            <div id="map"></div>

            <div class="tracking-panel">
                <div id="jobNotFound" class="warning-box" style="display: none;">
                    ⚠️ Job ID not found. Please check your tracking link.
                </div>

                <div id="statusSection" style="display: none;">
                    <div class="status-section">
                        <div class="status-label">Current Status</div>
                        <div class="status-icon" id="statusIcon">⏳</div>
                        <div class="status-value" id="statusText">Pending</div>
                        <div class="status-messages" id="statusMessage">
                            ✅ Request received! Doug will be with you soon.
                        </div>
                    </div>

                    <a href="tel:+12533225282" class="call-button">
                        <span>📞</span>
                        <span>Call Doug</span>
                    </a>

                    <div class="eta-section" id="etaSection" style="display: none;">
                        <div class="eta-label">Estimated Time</div>
                        <div class="eta-time" id="etaText">--:--</div>
                    </div>

                    <div class="job-details">
                        <div class="detail-row">
                            <span class="detail-label">Service Type</span>
                            <span class="detail-value" id="serviceTypeText">--</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Your Location</span>
                            <span class="detail-value" id="locationText">--</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Request Time</span>
                            <span class="detail-value" id="timeText">--</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Get job ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const jobId = urlParams.get('id');

        if (!jobId) {
            document.getElementById('jobNotFound').style.display = 'block';
        }

        // Initialize map
        const map = L.map('map').setView([47.25, -122.35], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap © CartoDB',
            maxZoom: 19,
            subdomains: 'abcd'
        }).addTo(map);

        let driverMarker = null;
        let customerMarker = null;
        let currentJob = null;
        let pollCount = 0;

        // Fetch job details
        async function fetchJobDetails() {
            try {
                const response = await fetch('https://canal-conceded-keep.ngrok-free.dev/jobs');
                const data = await response.json();
                const jobs = data.jobs || [];
                const job = jobs.find(j => j.id === jobId);

                if (!job) {
                    document.getElementById('jobNotFound').style.display = 'block';
                    document.getElementById('statusSection').style.display = 'none';
                    return;
                }

                currentJob = job;
                updateUI();
                updateMapMarkers();

                document.getElementById('jobNotFound').style.display = 'none';
                document.getElementById('statusSection').style.display = 'block';
            } catch (error) {
                console.error('Error fetching job:', error);
            }
        }

        // Update UI with job details
        function updateUI() {
            if (!currentJob) return;

            // Status
            const status = currentJob.status;
            const statusText = document.getElementById('statusText');
            const statusIcon = document.getElementById('statusIcon');
            const statusMessage = document.getElementById('statusMessage');

            switch (status) {
                case 'pending':
                    statusText.textContent = 'Pending';
                    statusIcon.textContent = '⏳';
                    statusMessage.innerHTML = '✅ Request received! Doug will be with you soon.';
                    break;
                case 'accepted':
                    statusText.textContent = 'On the Way';
                    statusIcon.textContent = '🚗';
                    statusMessage.innerHTML = '🚗 Doug is on the way! Check the map for his location.';
                    document.getElementById('etaSection').style.display = 'block';
                    updateETA();
                    break;
                case 'complete':
                    statusText.textContent = 'Complete';
                    statusIcon.textContent = '✅';
                    statusMessage.innerHTML = '✅ Job complete! Thanks for choosing Cascade Roadside.';
                    break;
                default:
                    statusText.textContent = status;
                    statusIcon.textContent = '❓';
            }

            // Job details
            document.getElementById('serviceTypeText').textContent = currentJob.service_type || '--';
            document.getElementById('locationText').textContent = currentJob.customer_address || '--';

            // Time
            if (currentJob.created_at) {
                const time = new Date(currentJob.created_at);
                document.getElementById('timeText').textContent = time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }

            // Update header status
            document.getElementById('trackingStatus').textContent = `Job #${jobId.substring(0, 8)}...`;
        }

        // Update map markers
        async function updateMapMarkers() {
            if (!currentJob) return;

            // Customer marker
            if (!customerMarker) {
                customerMarker = L.marker([currentJob.lat, currentJob.lng], {
                    icon: L.icon({
                        iconUrl: 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48Y2lyY2xlIGN4PSIyMCIgY3k9IjIwIiByPSI4IiBmaWxsPSIjZWE1ODExIiBzdHJva2U9IndoaXRlIiBzdHJva2Utd2lkdGg9IjIiLz48L3N2Zz4=',
                        iconSize: [40, 40],
                        iconAnchor: [20, 20]
                    })
                }).addTo(map).bindPopup(`<div style="text-align:center;"><strong>Your Location</strong></div>`);
            }

            // Fetch and update driver marker
            try {
                const response = await fetch('https://canal-conceded-keep.ngrok-free.dev/driver-location');
                const location = await response.json();

                if (location && location.lat && location.lng) {
                    if (!driverMarker) {
                        driverMarker = L.marker([location.lat, location.lng], {
                            icon: L.icon({
                                iconUrl: 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48cmVjdCB4PSI4IiB5PSI4IiB3aWR0aD0iMjQiIGhlaWdodD0iMjQiIHJ4PSIyIiBmaWxsPSIjMzI4MWNmIiBzdHJva2U9IndoaXRlIiBzdHJva2Utd2lkdGg9IjIiLz48L3N2Zz4=',
                                iconSize: [40, 40],
                                iconAnchor: [20, 20]
                            })
                        }).addTo(map).bindPopup(`<div style="text-align:center;"><strong>🚗 Doug's Location</strong></div>`);
                    } else {
                        driverMarker.setLatLng([location.lat, location.lng]);
                    }

                    // Fit both markers in view
                    if (currentJob.status === 'accepted') {
                        const group = new L.FeatureGroup([customerMarker, driverMarker]);
                        map.fitBounds(group.getBounds(), { padding: [50, 50] });
                    }
                }
            } catch (error) {
                console.error('Error fetching driver location:', error);
            }
        }

        // Calculate and update ETA
        function updateETA() {
            if (!currentJob || !driverMarker) return;

            const driverLatLng = driverMarker.getLatLng();
            const customerLatLng = [currentJob.lat, currentJob.lng];

            // Simple distance calculation (rough)
            const lat1 = driverLatLng.lat;
            const lon1 = driverLatLng.lng;
            const lat2 = customerLatLng[0];
            const lon2 = customerLatLng[1];

            const R = 3959; // Earth's radius in miles
            const dLat = ((lat2 - lat1) * Math.PI) / 180;
            const dLon = ((lon2 - lon1) * Math.PI) / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos((lat1 * Math.PI) / 180) * Math.cos((lat2 * Math.PI) / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            const distance = R * c;

            // Rough estimate: 30 mph average speed
            const minutes = Math.ceil((distance / 30) * 60);

            const etaText = document.getElementById('etaText');
            if (minutes < 1) {
                etaText.textContent = '< 1 min';
            } else if (minutes > 60) {
                const hrs = Math.floor(minutes / 60);
                const mins = minutes % 60;
                etaText.textContent = `${hrs}h ${mins}m`;
            } else {
                etaText.textContent = `${minutes} min`;
            }
        }

        // Poll for updates every 5 seconds
        async function pollForUpdates() {
            await fetchJobDetails();
            pollCount++;

            if (pollCount % 2 === 0) {
                updateMapMarkers();
            }

            if (currentJob && currentJob.status === 'accepted') {
                updateETA();
            }
        }

        // Initial fetch
        fetchJobDetails();

        // Set up polling
        setInterval(pollForUpdates, 5000);
    </script>
</body>
</html>
